server.port: 8090
spring:
  application.name: notification-service
  datasource:
    url: ${DATABASE_URL:${DB_URL:jdbc:postgresql://localhost:5432/payment_platform}}
    username: ${DB_USERNAME:${DB_USER:payment}}
    password: ${DB_PASSWORD}
  jpa:
    hibernate.ddl-auto: update
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service
      properties.spring.json.trusted.packages: com.fintek.common.events
  threads.virtual.enabled: true
eureka.client.service-url.defaultZone: ${EUREKA_SERVER_URL:${EUREKA_URL:http://localhost:8761/eureka}}
management.endpoints.web.exposure.include: health,info
app:
  kafka:
    enabled: ${KAFKA_ENABLED:true}
  redis:
    enabled: ${REDIS_ENABLED:true}
