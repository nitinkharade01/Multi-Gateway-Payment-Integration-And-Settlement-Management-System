services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${LOCAL_POSTGRES_DB:-payment_platform_db}
      POSTGRES_USER: ${LOCAL_DB_USERNAME:-payment}
      POSTGRES_PASSWORD: ${LOCAL_DB_PASSWORD:?Set LOCAL_DB_PASSWORD}
    ports: [ "${POSTGRES_HOST_PORT:-5432}:5432" ]
    volumes: [ "postgres-data:/var/lib/postgresql/data" ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports: [ "6379:6379" ]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports: [ "2181:2181" ]

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    depends_on: [ zookeeper ]
    ports: [ "9092:9092" ]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  discovery-server:
    build:
      context: .
      args: { SERVICE_JAR: discovery-server/target/discovery-server-1.0.0-SNAPSHOT.jar }
    ports: [ "8761:8761" ]

  api-gateway:
    build:
      context: .
      args: { SERVICE_JAR: api-gateway/target/api-gateway-1.0.0-SNAPSHOT.jar }
    environment:
      EUREKA_URL: http://discovery-server:8761/eureka
    depends_on: [ discovery-server ]
    ports: [ "8080:8080" ]

  auth-service:
    build: { context: ., args: { SERVICE_JAR: auth-service/target/auth-service-1.0.0-SNAPSHOT.jar } }
    environment: &backend-env
      DB_URL: ${DATABASE_URL:-jdbc:postgresql://postgres:5432/payment_platform_db}
      DATABASE_URL: ${DATABASE_URL:-jdbc:postgresql://postgres:5432/payment_platform_db}
      DB_USER: ${DB_USERNAME:-payment}
      DB_USERNAME: ${DB_USERNAME:-payment}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_ENABLED: "true"
      EUREKA_URL: http://discovery-server:8761/eureka
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
    depends_on: [ postgres, redis, kafka, discovery-server ]
    ports: [ "8081:8081" ]

  merchant-service:
    build: { context: ., args: { SERVICE_JAR: merchant-service/target/merchant-service-1.0.0-SNAPSHOT.jar } }
    environment: *backend-env
    depends_on: [ postgres, discovery-server ]
    ports: [ "8082:8082" ]

  payment-service:
    build: { context: ., args: { SERVICE_JAR: payment-service/target/payment-service-1.0.0-SNAPSHOT.jar } }
    environment:
      <<: *backend-env
      MERCHANT_SERVICE_URL: http://merchant-service:8082
      ROUTING_SERVICE_URL: http://gateway-routing-service:8084
    depends_on: [ merchant-service, gateway-routing-service, kafka ]
    ports: [ "8083:8083" ]

  gateway-routing-service:
    build: { context: ., args: { SERVICE_JAR: gateway-routing-service/target/gateway-routing-service-1.0.0-SNAPSHOT.jar } }
    environment: *backend-env
    depends_on: [ postgres, discovery-server ]
    ports: [ "8084:8084" ]

  webhook-service:
    build: { context: ., args: { SERVICE_JAR: webhook-service/target/webhook-service-1.0.0-SNAPSHOT.jar } }
    environment:
      <<: *backend-env
      PAYMENT_SERVICE_URL: http://payment-service:8083
    depends_on: [ payment-service, kafka ]
    ports: [ "8085:8085" ]

  refund-service:
    build: { context: ., args: { SERVICE_JAR: refund-service/target/refund-service-1.0.0-SNAPSHOT.jar } }
    environment:
      <<: *backend-env
      PAYMENT_SERVICE_URL: http://payment-service:8083
    depends_on: [ payment-service, kafka ]
    ports: [ "8086:8086" ]

  settlement-service:
    build: { context: ., args: { SERVICE_JAR: settlement-service/target/settlement-service-1.0.0-SNAPSHOT.jar } }
    environment:
      <<: *backend-env
      PAYMENT_SERVICE_URL: http://payment-service:8083
    depends_on: [ payment-service, kafka ]
    ports: [ "8087:8087" ]

  reconciliation-service:
    build: { context: ., args: { SERVICE_JAR: reconciliation-service/target/reconciliation-service-1.0.0-SNAPSHOT.jar } }
    environment:
      <<: *backend-env
      PAYMENT_SERVICE_URL: http://payment-service:8083
    depends_on: [ payment-service ]
    ports: [ "8088:8088" ]

  fraud-monitoring-service:
    build: { context: ., args: { SERVICE_JAR: fraud-monitoring-service/target/fraud-monitoring-service-1.0.0-SNAPSHOT.jar } }
    environment: *backend-env
    depends_on: [ postgres, kafka ]
    ports: [ "8089:8089" ]

  notification-service:
    build: { context: ., args: { SERVICE_JAR: notification-service/target/notification-service-1.0.0-SNAPSHOT.jar } }
    environment: *backend-env
    depends_on: [ postgres, kafka ]
    ports: [ "8090:8090" ]

  frontend:
    build: { context: ./frontend-react }
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    depends_on: [ api-gateway ]
    ports: [ "3000:80" ]

volumes:
  postgres-data:
