server:
  port: 8085

spring:
  application:
    name: webhook-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/payment_platform_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  threads:
    virtual:
      enabled: true

webhook:
  replay-window-seconds: 300
  secrets:
    razorpay: ${RAZORPAY_WEBHOOK_SECRET:razorpay-local-secret}
    cashfree: ${CASHFREE_WEBHOOK_SECRET:cashfree-local-secret}
    payu: ${PAYU_WEBHOOK_SECRET:payu-local-secret}

services:
  payment-url: ${PAYMENT_SERVICE_URL:http://localhost:8083}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  kafka:
    enabled: ${KAFKA_ENABLED:true}
  redis:
    enabled: ${REDIS_ENABLED:true}

