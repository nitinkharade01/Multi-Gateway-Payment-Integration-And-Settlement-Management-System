spring:
  datasource:
    url: jdbc:h2:mem:webhook_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  kafka:
    bootstrap-servers: localhost:0
  cloud:
    discovery:
      enabled: false
eureka:
  client:
    enabled: false
webhook:
  replay-window-seconds: 300
  secrets:
    razorpay: razorpay-test-secret
    cashfree: cashfree-test-secret
    payu: payu-test-secret
services:
  payment-url: http://localhost:0
