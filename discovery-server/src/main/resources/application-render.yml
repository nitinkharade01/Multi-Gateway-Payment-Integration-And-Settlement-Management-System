server:
  port: ${PORT:8080}

spring:
  application:
    name: discovery-server

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  server:
    enable-self-preservation: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
