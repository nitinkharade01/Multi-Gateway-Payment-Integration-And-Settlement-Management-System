spring:
  datasource:
    url: jdbc:h2:mem:payment_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  kafka:
    bootstrap-servers: localhost:0
  data:
    redis:
      host: localhost
  cloud:
    discovery:
      enabled: false
eureka:
  client:
    enabled: false
services:
  merchant-url: http://localhost:0
  routing-url: http://localhost:0
