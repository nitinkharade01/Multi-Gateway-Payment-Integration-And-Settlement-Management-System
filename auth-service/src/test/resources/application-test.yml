spring:
  datasource:
    url: jdbc:h2:mem:auth_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  cloud:
    discovery:
      enabled: false
eureka:
  client:
    enabled: false
security:
  jwt:
    issuer: payment-platform-test
    secret: test-secret-with-enough-length-for-hmac-sha-signing-512-bits
    access-ttl-millis: 900000
    refresh-ttl-days: 7
