server:
  port: ${PORT:8080}

spring:
  application:
    name: auth-service
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
  threads:
    virtual:
      enabled: true

security:
  jwt:
    issuer: ${JWT_ISSUER:payment-platform}
    secret: ${JWT_SECRET}
    access-ttl-millis: ${JWT_EXPIRATION:86400000}
    refresh-ttl-days: ${JWT_REFRESH_TTL_DAYS:7}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: false

management:
  health:
    redis:
      enabled: ${REDIS_ENABLED:false}
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  admin:
    default-email: ${ADMIN_DEFAULT_EMAIL:admin@payment.com}
    default-password: ${ADMIN_DEFAULT_PASSWORD:}
  kafka:
    enabled: ${KAFKA_ENABLED:false}
  redis:
    enabled: ${REDIS_ENABLED:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
