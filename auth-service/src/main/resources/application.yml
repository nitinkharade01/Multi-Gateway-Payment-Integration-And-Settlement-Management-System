server:
  port: 8081
spring:
  application.name: auth-service
  datasource:
    url: ${DATABASE_URL:${DB_URL:jdbc:postgresql://localhost:5432/payment_platform}}
    username: ${DB_USERNAME:${DB_USER:payment}}
    password: ${DB_PASSWORD:payment}
  jpa:
    hibernate.ddl-auto: update
    open-in-view: false
  data.redis.host: ${REDIS_HOST:localhost}
  threads.virtual.enabled: true
security:
  jwt:
    issuer: payment-platform
    secret: ${JWT_SECRET:change-this-demo-secret-to-a-long-random-512-bit-value-before-production-use}
    access-ttl-millis: ${JWT_EXPIRATION:900000}
    refresh-ttl-days: 7
eureka.client.service-url.defaultZone: ${EUREKA_SERVER_URL:${EUREKA_URL:http://localhost:8761/eureka}}
management.endpoints.web.exposure.include: health,info
app:
  kafka:
    enabled: ${KAFKA_ENABLED:true}
  redis:
    enabled: ${REDIS_ENABLED:true}
